name: quality-gate

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  verify:
    if: ${{ matrix.profile == 'fast' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [fast, strict]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright browsers
        if: ${{ matrix.profile == 'strict' }}
        run: npx --prefix frontend playwright install --with-deps chromium

      - name: Run quality gate (${{ matrix.profile }})
        run: python scripts/run_quality_gate.py --profile ${{ matrix.profile }}

      - name: Upload Playwright failure artifacts
        if: ${{ failure() && matrix.profile == 'strict' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 14
