name: quality-gate

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-fast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Backend unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Frontend lint
        run: npm --prefix frontend run lint

      - name: Frontend typecheck
        run: npm --prefix frontend run typecheck

      - name: Frontend unit tests
        run: npm --prefix frontend run test:unit

  verify-strict:
    if: ${{ github.event_name != 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright browsers
        run: npx --prefix frontend playwright install --with-deps chromium

      - name: Backend unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Backend API smoke
        run: python scripts/smoke_backend_api.py --spawn-server --host 127.0.0.1 --port 18000

      - name: Frontend lint
        run: npm --prefix frontend run lint

      - name: Frontend typecheck
        run: npm --prefix frontend run typecheck

      - name: Frontend unit tests
        run: npm --prefix frontend run test:unit

      - name: Frontend backend-mode E2E
        run: npm --prefix frontend run test:e2e:backend

      - name: Frontend E2E
        run: npm --prefix frontend run test:e2e

      - name: Frontend build
        run: npm --prefix frontend run build

      - name: Upload Playwright failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 14
